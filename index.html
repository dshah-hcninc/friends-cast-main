<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Video Player</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      /* Prevent bounce/scroll on iOS */
      position: fixed;
      top: 0;
      left: 0;
    }

    video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* cover fills the screen; change to "contain" if you never want cropping */
      -o-object-fit: cover;
      object-fit: cover;
    }

    /* Tap-to-unmute overlay — shown when autoplay muted */
    #unmute-btn {
      display: none;
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.7);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      font-family: sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Tap-to-play overlay — shown when autoplay is fully blocked */
    #play-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    #play-overlay svg {
      width: 88px;
      height: 88px;
      fill: rgba(255,255,255,0.9);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.6));
    }
  </style>
</head>

<body>
  <!--
    muted        – required for autoplay in most browsers/webviews
    playsinline  – prevents iOS Safari from going full-screen automatically
    webkit-playsinline – older iOS WebView support
    preload="auto" – buffer immediately for smooth start
  -->
  <video
    id="vid"
    src="Diplomat_Hotel_MoneyShow_720p_3_fixed.mp4"
    muted
    autoplay
    playsinline
    webkit-playsinline
    x5-playsinline
    x5-video-player-type="h5"
    preload="auto"
    loop
    controls
  ></video>

  <button id="unmute-btn" aria-label="Unmute video">🔇 Tap to unmute</button>

  <div id="play-overlay" role="button" aria-label="Play video">
    <!-- Simple play triangle -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M8 5v14l11-7z"/>
    </svg>
  </div>

  <script>
    (function () {
      var vid = document.getElementById('vid');
      var unmuteBtn = document.getElementById('unmute-btn');
      var playOverlay = document.getElementById('play-overlay');

      function tryPlay(muted) {
        vid.muted = muted;
        var p = vid.play();
        if (p !== undefined) {
          p.catch(function () {
            if (!muted) {
              // Muted fallback
              vid.muted = true;
              vid.play().then(function () {
                showUnmuteBtn();
              }).catch(function () {
                // Full block — show manual play button
                showPlayOverlay();
              });
            } else {
              showPlayOverlay();
            }
          });
          if (muted) {
            p.then(function () { showUnmuteBtn(); }).catch(function () {});
          }
        }
      }

      function showUnmuteBtn() {
        unmuteBtn.style.display = 'block';
      }

      function showPlayOverlay() {
        playOverlay.style.display = 'flex';
      }

      // Unmute button
      unmuteBtn.addEventListener('click', function () {
        vid.muted = false;
        vid.volume = 1;
        unmuteBtn.style.display = 'none';
      });

      // Manual play overlay
      playOverlay.addEventListener('click', function () {
        playOverlay.style.display = 'none';
        vid.muted = true;
        vid.play().then(function () {
          showUnmuteBtn();
        });
      });

      tryPlay(true);
    })();
  </script>
</body>

</html>
