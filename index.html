<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <!-- hint for Android browser/WebView to use Blink engine if available -->
  <meta name="renderer" content="webkit" />
  <meta name="force-rendering" content="webkit" />
  <title>Video Player</title>
  <style>
    * {
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    /* Full-screen wrapper — avoids position:fixed bugs in old Android WebViews */
    #wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* GPU compositing layer — helps old WebViews render video smoothly */
      -webkit-transform: translateZ(0);
      transform: translateZ(0);
    }

    /*
      object-fit:cover polyfill via min-width/min-height + centering transform.
      Works on Android WebView 4.x+ which doesn't support object-fit on <video>.
    */
    video {
      position: absolute;
      top: 50%;
      left: 50%;
      /* keep native aspect ratio */
      width: auto;
      height: auto;
      /* fill the screen on the shorter axis */
      min-width: 100%;
      min-height: 100%;
      /* center */
      -webkit-transform: translate(-50%, -50%);
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
      /* GPU layer for smooth decode on ARM */
      -webkit-backface-visibility: hidden;
      backface-visibility: hidden;
    }

    /* Tap-to-unmute overlay — shown when autoplay muted */
    #unmute-btn {
      display: none;
      position: absolute;
      bottom: 24px;
      right: 24px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      border: 2px solid rgba(255,255,255,0.7);
      -webkit-border-radius: 8px;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 15px;
      font-family: sans-serif;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Tap-to-play overlay — shown when autoplay is fully blocked */
    #play-overlay {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9;
      background: rgba(0,0,0,0.6);
      /* flexbox with full webkit prefix chain for old WebViews */
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* start hidden; JS will switch to flex when needed */
    #play-overlay.hidden { display: none !important; }

    #play-overlay svg {
      width: 88px;
      height: 88px;
      fill: rgba(255,255,255,0.9);
    }
  </style>
</head>

<body>
  <div id="wrapper">
    <!--
      muted        – required for autoplay on modern browsers
      playsinline  – stay inline on iOS; prevent forced fullscreen
      webkit-playsinline – legacy iOS WebView
      x5-*         – Tencent X5 / WeChat WebView (common on low-end Android)
      preload=auto – start buffering immediately
      type=video/mp4 inside <source> – helps old WebViews choose the codec
    -->
    <video
      id="vid"
      muted
      autoplay
      playsinline
      webkit-playsinline
      x5-playsinline
      x5-video-player-type="h5"
      x5-video-player-fullscreen="false"
      preload="auto"
      loop
      controls
    >
      <source src="Diplomat_Hotel_MoneyShow_720p_3_fixed.mp4" type="video/mp4" />
    </video>

    <button id="unmute-btn" aria-label="Unmute video">Tap to unmute</button>

    <div id="play-overlay" class="hidden" role="button" aria-label="Play video">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </div>
  </div>

  <script>
    /* ES5-only — runs on Android 4.4+ WebView */
    (function () {
      var vid = document.getElementById('vid');
      var unmuteBtn = document.getElementById('unmute-btn');
      var playOverlay = document.getElementById('play-overlay');

      /* Resize video to cover wrapper (object-fit:cover fallback in JS) */
      function coverResize() {
        var wW = window.innerWidth  || document.documentElement.clientWidth;
        var wH = window.innerHeight || document.documentElement.clientHeight;
        var vW = vid.videoWidth  || 1280;
        var vH = vid.videoHeight || 720;
        var scale = Math.max(wW / vW, wH / vH);
        var newW = Math.ceil(vW * scale);
        var newH = Math.ceil(vH * scale);
        vid.style.width  = newW + 'px';
        vid.style.height = newH + 'px';
      }

      vid.addEventListener('loadedmetadata', coverResize);
      window.addEventListener('resize', coverResize);
      window.addEventListener('orientationchange', function () {
        setTimeout(coverResize, 300); /* wait for rotation to settle */
      });

      function showUnmuteBtn() {
        unmuteBtn.style.display = 'block';
      }

      function showPlayOverlay() {
        playOverlay.className = ''; /* remove "hidden" */
      }

      function hidePlayOverlay() {
        playOverlay.className = 'hidden';
      }

      function tryPlay() {
        vid.muted = true;
        var p = vid.play();
        if (p !== undefined) {
          /* modern promise-based API */
          p.then(function () {
            showUnmuteBtn();
          })['catch'](function () {
            /* fully blocked — show manual play button */
            showPlayOverlay();
          });
        } else {
          /* very old WebView: play() returns nothing; assume it started */
          showUnmuteBtn();
        }
      }

      /* Unmute button */
      unmuteBtn.addEventListener('click', function () {
        vid.muted = false;
        vid.volume = 1;
        unmuteBtn.style.display = 'none';
      });

      /* Manual play overlay */
      playOverlay.addEventListener('click', function () {
        hidePlayOverlay();
        vid.muted = true;
        var p = vid.play();
        if (p !== undefined) {
          p.then(function () { showUnmuteBtn(); })['catch'](function () {});
        } else {
          showUnmuteBtn();
        }
      });

      tryPlay();
    })();
  </script>
</body>

</html>
