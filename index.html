<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Video Player</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="player"></div>

  <script>
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    var player;

    window.onYouTubeIframeAPIReady = function () {
      player = new YT.Player('player', {
        videoId: '4MTGcekQsis',
        playerVars: {
          autoplay: 1,      // autoplay
          mute: 1,          // must start muted (browser policy), unmuted instantly via API
          loop: 0,          // no loop — stop when finished
          playsinline: 1,
          controls: 1,
          rel: 0
        },
        events: {
          onReady: function (e) {
            e.target.playVideo();
          },
          onStateChange: function (e) {
            // As soon as playing starts, wait 1s then unmute to full volume
            if (e.data === YT.PlayerState.PLAYING) {
              setTimeout(function () {
                e.target.unMute();
                e.target.setVolume(100);
              }, 1000);
            }
            // When video ends, stop and reset to beginning
            if (e.data === YT.PlayerState.ENDED) {
              e.target.stopVideo();
              e.target.seekTo(0);
            }
          }
        }
      });
    };
  </script>
</body>

</html>
